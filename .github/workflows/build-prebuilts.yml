name: Build VSIX with native better-sqlite3

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-prebuilts:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_VERSION: '25.2.1'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Rebuild native modules (better-sqlite3)
        run: |
          # Rebuild native modules for the Electron/VS Code ABI using electron-rebuild.
          # This helps produce binaries compatible with the Extension Host.
          npx electron-rebuild -f -w better-sqlite3 || npm rebuild better-sqlite3 --build-from-source

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.os }}
          path: '*.vsix'
